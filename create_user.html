{% extends "base.html" %}

{% block content %}

<h2>Användare</h2>

{% if message %}
<p style="color: green;">{{ message }}</p>
{% endif %}

{% if error %}
<p style="color: red;">{{ error }}</p>
{% endif %}

<h3>Skapa användare</h3>

<form method="post" action="/ui/users">
    <input type="text" name="name" placeholder="Namn" required>
    <button type="submit">Skapa</button>
</form>

<h3>Befintliga användare</h3>

<table border="1" cellpadding="6">
    <tr>
        <th>ID</th>
        <th>Namn</th>
        <th>Åtgärd</th>
    </tr>

    {% for u in users %}
    <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.name }}</td>
        <td>
            <form method="post" action="/ui/users/{{ u.id }}/delete">
                <button onclick="return confirm('Ta bort {{ u.name }}?')">
                    Ta bort
                </button>
            </form>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
