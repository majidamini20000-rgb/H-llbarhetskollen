{% extends "base.html" %}

{% block content %}

<h2>Logga aktivitet</h2>

<!-- ✅ SUCCESS / ERROR MESSAGES -->
{% if message %}
    <div style="padding:10px; background:#d4edda; color:#155724; margin-bottom:10px;">
        {{ message }}
    </div>
{% endif %}

{% if error %}
    <div style="padding:10px; background:#f8d7da; color:#721c24; margin-bottom:10px;">
        {{ error }}
    </div>
{% endif %}

<form method="post" action="/ui/activities">

    <!-- USER -->
    <label>Användare</label><br>
    <select name="user_id" required>
        {% for u in users %}
            <option value="{{ u.id }}">{{ u.name }}</option>
        {% endfor %}
    </select>

    <br><br>

    <!-- CATEGORY -->
    <label>Kategori</label><br>
    <select name="category" required>
        {% set seen = [] %}
        {% for f in factors %}
            {% if f.category not in seen %}
                <option value="{{ f.category }}">{{ f.category }}</option>
                {% set _ = seen.append(f.category) %}
            {% endif %}
        {% endfor %}
    </select>

    <br><br>

    <!-- KEY -->
    <label>Typ (key)</label><br>
    <select name="key" required>
        {% for f in factors %}
            <option value="{{ f.key }}">
                {{ f.key }} ({{ f.unit }})
            </option>
        {% endfor %}
    </select>

    <br><br>

    <!-- AMOUNT -->
    <label>Mängd</label><br>
    <input type="number" step="0.1" name="amount" required>

    <br><br>

    <!-- DATE -->
    <label>Datum</label><br>
    <input type="date" name="date" required>

    <br><br>

    <button type="submit">Spara aktivitet</button>
</form>

{% endblock %}
